<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Resume</title>
<style>
  body { font-family: 'Helvetica Neue', Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; line-height: 1.6; }
  h1 { font-size: 24px; margin-bottom: 4px; }
  h2 { font-size: 16px; color: #555; border-bottom: 1px solid #ddd; padding-bottom: 4px; margin-top: 24px; }
  .contact { color: #666; font-size: 14px; margin-bottom: 20px; }
  .entry { margin-bottom: 16px; }
  .entry-header { display: flex; justify-content: space-between; }
  .entry-title { font-weight: 600; }
  .entry-date { color: #888; font-size: 14px; }
  ul { margin: 4px 0 0 20px; }
  li { margin: 2px 0; font-size: 14px; }
</style>
</head>
<body>
  <h1>[Your Name]</h1>
  <div class="contact">[email] | [location] | [github/portfolio]</div>

  <h2>Experience</h2>
  <div class="entry">
    <div class="entry-header">
      <span class="entry-title">[Role] — [Company]</span>
      <span class="entry-date">[Date Range]</span>
    </div>
    <ul>
      <li>[Achievement with measurable outcome]</li>
      <li>[Achievement with measurable outcome]</li>
    </ul>
  </div>

  <h2>Projects</h2>
  <div class="entry">
    <div class="entry-header">
      <span class="entry-title">[Project Name]</span>
    </div>
    <ul>
      <li>[What it does, tech stack, key metrics]</li>
    </ul>
  </div>

  <h2>Education</h2>
  <div class="entry">
    <span class="entry-title">[Degree] — [School]</span>
  </div>
</body>
</html>
