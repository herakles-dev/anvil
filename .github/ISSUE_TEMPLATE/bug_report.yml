name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click the export button, nothing happens..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "I expected the export modal to open with all my field contents..."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Set up a company with constellation fields
        2. Write content in 3 fields
        3. Press Ctrl+Shift+X
        4. Nothing happens
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI / Browser
        - Evidence sidebar
        - Constellation fields / word counter
        - Resume editor / PDF
        - Export
        - Review notes
        - Docker / deployment
        - API
        - CLI workflow
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Docker version, how you're running Anvil.
      placeholder: |
        - OS: macOS 14.5
        - Browser: Chrome 125
        - Docker: 26.1.3
        - Running via: docker compose
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant error messages, browser console output, or screenshots.
    validations:
      required: false
