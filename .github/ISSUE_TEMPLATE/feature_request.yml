name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Anvil? Describe what you'd like and why it would help.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that Anvil doesn't support well today?
      placeholder: "When I'm applying to multiple companies, I have to..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature or change you'd like.
      placeholder: "A dashboard that shows progress across all companies at once..."
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI / Browser
        - Evidence sidebar
        - Constellation fields
        - Resume editor
        - Export
        - CLI workflow / API
        - Docker / deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds?
    validations:
      required: false
