version: 2
updates:
  # Keep SHA-pinned GitHub Actions fresh without losing the pin.
  # Dependabot opens PRs bumping the SHA when the tag moves.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
